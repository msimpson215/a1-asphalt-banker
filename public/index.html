<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>A1 Brain</title>

  <style>
    body {
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-around;
      height: 100vh;
      background: radial-gradient(circle, #252525 0%, #000000 100%);
      color: #FED100; /* HIGHWAY SAFETY YELLOW */
      font-family: "Arial Narrow", Arial, sans-serif;
      font-weight: 300;
      overflow: hidden;
      user-select: none;
    }

    #status-text {
      font-size: 2.0rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-align: center;
      padding: 0 18px;
      line-height: 1.15;
    }

    #orb-container {
      width: 220px;
      height: 220px;
      cursor: pointer;
      display: grid;
      place-items: center;
    }

    .orb {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background-color: #FED100;
      box-shadow: 0 0 55px rgba(254, 209, 0, 0.75);
      transform: scale(1);
      transition: transform 260ms ease, box-shadow 260ms ease, filter 260ms ease;
      will-change: transform, box-shadow;
    }

    /* Gentle hover (desktop) */
    #orb-container:hover .orb {
      transform: scale(1.03);
      box-shadow: 0 0 70px rgba(254, 209, 0, 0.85);
    }

    /* Wake-up expansion immediately when active */
    body.active .orb {
      transform: scale(1.14);
      box-shadow: 0 0 95px rgba(254, 209, 0, 1);
      animation: pulse 1.35s infinite alternate ease-in-out;
    }

    @keyframes pulse {
      0%   { transform: scale(1.10); box-shadow: 0 0 65px rgba(254,209,0,0.75); }
      100% { transform: scale(1.17); box-shadow: 0 0 110px rgba(254,209,0,1); }
    }

    /* Optional calmer "stopping" feel */
    body.idle .orb {
      transform: scale(1);
      box-shadow: 0 0 55px rgba(254, 209, 0, 0.75);
      animation: none;
    }

    #footer-brand {
      font-size: 0.9rem;
      text-transform: uppercase;
      opacity: 0.55;
      letter-spacing: 1px;
      text-align: center;
      padding: 0 18px;
    }
  </style>
</head>

<body class="idle">
  <div id="status-text">PRESS TO TALK</div>

  <div id="orb-container" title="Press to talk">
    <div class="orb"></div>
  </div>

  <div id="footer-brand">A1 Professional Asphalt &amp; Concrete</div>

  <script src="app.js"></script>
</body>
</html>
