<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>VoxTalk A1 Asphalt</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="data:,">
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      display: grid;
      place-items: center;
      min-height: 100vh;
      background: radial-gradient(circle at 50% 20%, #dbeafe, #93c5fd 40%, #1e3a8a 90%);
    }

    .app {
      text-align: center;
      max-width: 600px;
      width: min(92vw, 600px);
    }

    .demo-label {
      font-size: 12px;
      color: #111;
      margin-bottom: 4px;
    }

    h1 {
      margin: 6px 0 16px;
      font-size: 22px;
      color: #111;
    }

    #pttBtn {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      background: radial-gradient(circle at 30% 30%, #3b82f6, #1e40af);
      box-shadow: 0 6px 18px rgba(37, 99, 235, 0.3);
      transition: transform 0.15s ease, box-shadow 0.3s ease;
      position: relative;
    }

    #pttBtn:hover { transform: scale(1.02); }
    #pttBtn:active { transform: scale(0.95); }

    #pttBtn.listening {
      animation: listenPulse 1.6s ease-in-out infinite;
    }

    @keyframes listenPulse {
      0%   { box-shadow: 0 0 0 0 rgba(59,130,246,.7); }
      50%  { box-shadow: 0 0 0 20px rgba(59,130,246,0); }
      100% { box-shadow: 0 0 0 0 rgba(59,130,246,0); }
    }

    #pttBtn.speaking::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: conic-gradient(from 0deg, #60a5fa, #2563eb, #1e40af, #60a5fa);
      animation: swirl 2s linear infinite;
      -webkit-mask: radial-gradient(circle, rgba(0,0,0,0) 65%, rgba(0,0,0,1) 66%);
      mask: radial-gradient(circle, rgba(0,0,0,0) 65%, rgba(0,0,0,1) 66%);
    }

    @keyframes swirl {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    #answer {
      margin-top: 20px;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: white;
      min-height: 120px;
      max-height: 320px;
      overflow-y: auto;
      text-align: left;
      font-size: 14px;
    }

    .line { margin: 8px 0; }
    .me { color: #2563eb; font-weight: 600; }
    .ai { color: #065f46; font-weight: 600; }
    .text { color: #111; }
    .muted { color: #777; font-style: italic; }
  </style>
</head>
<body>
  <div class="app">
    <p class="demo-label">Demo</p>
    <h1>Talk to A1 Professional Asphalt</h1>
    <button id="pttBtn" aria-pressed="false" aria-label="Push to talk"></button>
    <div id="answer"><div class="muted">Conversation will appear here.</div></div>
    <audio id="remote" autoplay playsinline></audio>
  </div>

  <script>
    const pttBtn = document.getElementById("pttBtn");
    const answerEl = document.getElementById("answer");
    const rtAudio = document.getElementById("remote");

    let pc = null;
    let dc = null;
    let micStream = null;
    let micTrack = null;
    let talking = false;
    let aiTranscriptBuffer = "";
    let connected = false;

    function appendLine(role, text) {
      if (answerEl.querySelector(".muted")) answerEl.innerHTML = "";

      const div = document.createElement("div");
      div.className = "line";

      const label = role === "me" ? "You:" : "AI:";
      const cls = role === "me" ? "me" : "ai";

      div.innerHTML = `<span class="${cls}">${label}</span> <span class="text"></span>`;
      div.querySelector(".text").textContent = text;

      answerEl.appendChild(div);
      answerEl.scrollTop = answerEl.scrollHeight;
    }

    function setListening(on) {
      pttBtn.classList.toggle("listening", on);
      pttBtn.setAttribute("aria-pressed", on ? "true" : "false");
    }

    function setSpeaking(on) {
      pttBtn.classList.toggle("speaking", on);
    }

    async function initRealtime() {
      try {
        const sessionRes = await fetch("/session", { method: "POST" });
        if (!sessionRes.ok) {
          throw new Error(`Session failed: ${sessionRes.status} ${await sessionRes.text()}`);
        }

        const sessionData = await sessionRes.json();
        const clientSecret = sessionData.client_secret?.value;

        if (!clientSecret) {
          throw new Error("No client secret returned from /session");
        }

        pc = new RTCPeerConnection();

        micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        micTrack = micStream.getTracks()[0];
        micTrack.enabled = false;

        pc.addTrack(micTrack, micStream);

        pc.ontrack = (event) => {
          rtAudio.srcObject = event.streams[0];
          rtAudio.play().catch(() => {});
        };

        dc = pc.createDataChannel("oai-events");

        dc.onopen = () => {
          connected = true;
          console.log("Data channel open");

          // Ask for the exact greeting once, after the channel is ready.
          dc.send(JSON.stringify({
            type: "response.create",
            response: {
              modalities: ["audio", "text"],
              instructions: "Say exactly: Hello, welcome to A1 Professional Asphalt and Concrete. I'm an AI team member here to answer all your questions. What can I do for you?"
            }
          }));
        };

        dc.onmessage = (event) => {
          try {
            const msg = JSON.parse(event.data);
            console.log("Realtime event:", msg);

            // User transcript completed
            if (
              msg.type === "conversation.item.input_audio_transcription.completed" &&
              msg.transcript
            ) {
              appendLine("me", msg.transcript.trim());
            }

            // AI transcript chunks
            if (msg.type === "response.audio_transcript.delta" && msg.delta) {
              aiTranscriptBuffer += msg.delta;
            }

            // AI transcript final
            if (msg.type === "response.audio_transcript.done") {
              const text = aiTranscriptBuffer.trim();
              if (text) appendLine("ai", text);
              aiTranscriptBuffer = "";
            }

            if (msg.type === "error") {
              console.error("Realtime error:", msg);
            }
          } catch (err) {
            console.error("Data channel parse error:", err);
          }
        };

        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);

        const realtimeRes = await fetch("https://api.openai.com/v1/realtime?model=gpt-4o-realtime-preview", {
          method: "POST",
          headers: {
            "Authorization": `Bearer ${clientSecret}`,
            "Content-Type": "application/sdp"
          },
          body: offer.sdp
        });

        if (!realtimeRes.ok) {
          throw new Error(`Realtime SDP failed: ${realtimeRes.status} ${await realtimeRes.text()}`);
        }

        const answerSdp = await realtimeRes.text();
        await pc.setRemoteDescription({ type: "answer", sdp: answerSdp });

        pttBtn.addEventListener("click", () => {
          if (!connected || !dc || !micTrack) return;

          talking = !talking;
          micTrack.enabled = talking;
          setListening(talking);

          if (!talking) {
            // User stopped talking: commit audio and explicitly request response
            dc.send(JSON.stringify({ type: "input_audio_buffer.commit" }));
            dc.send(JSON.stringify({
              type: "response.create",
              response: {
                modalities: ["audio", "text"]
              }
            }));
          }
        });

        rtAudio.addEventListener("playing", () => setSpeaking(true));
        rtAudio.addEventListener("ended", () => setSpeaking(false));
        rtAudio.addEventListener("pause", () => setSpeaking(false));

      } catch (err) {
        console.error("Realtime init failed:", err);
        appendLine("ai", `Startup error: ${err.message}`);
      }
    }

    initRealtime();
  </script>
</body>
</html>
