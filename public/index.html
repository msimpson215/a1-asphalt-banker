<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>A1 Brain</title>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100vh;
            padding: 60px 20px;
            background-color: #1a1a1a; /* Solid Asphalt Black */
            color: #ffcc00; /* Traffic Yellow */
            /* FORCING THE EXACT HEAVY IMPACT FONT */
            font-family: 'Impact', 'Arial Narrow Bold', sans-serif;
            overflow: hidden;
            box-sizing: border-box;
            text-align: center;
        }

        #status-text {
            font-size: 4.5rem; /* Massive, Heavy Weight */
            letter-spacing: 1px;
            text-transform: uppercase;
            line-height: 1.1;
            margin: 0;
            flex-shrink: 0;
        }

        #orb-container {
            width: 260px; /* Precise scaling to prevent overlap */
            height: 260px;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .orb {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-color: #ffcc00; 
            box-shadow: 0 0 80px rgba(255, 204, 0, 1);
        }

        body.active .orb {
            animation: pulse 1s infinite alternate ease-in-out;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        #footer-brand {
            font-size: 2.5rem; /* Heavy Bold weight */
            letter-spacing: 1px;
            text-transform: uppercase;
            margin: 0;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

    <div id="status-text">TALK TO OUR AI TEAM MEMBER</div>

    <div id="orb-container" onclick="start()">
        <div class="orb"></div>
    </div>

    <div id="footer-brand">A1 Professional Asphalt LLC</div>

    <script>
        async function start() {
            document.body.className = 'active';
            document.getElementById('status-text').textContent = "LISTENING...";
            try {
                const r = await fetch('/session');
                const data = await r.json();
                
                const pc = new RTCPeerConnection();
                const audio = document.createElement("audio");
                audio.autoplay = true;
                pc.ontrack = e => audio.srcObject = e.streams[0];

                const ms = await navigator.mediaDevices.getUserMedia({ audio: true });
                pc.addTrack(ms.getTracks()[0]);

                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);

                const sdpResponse = await fetch(`https://api.openai.com/v1/realtime?model=gpt-4o-realtime-preview-2024-12-17`, {
                    method: "POST",
                    body: offer.sdp,
                    headers: { 
                        Authorization: `Bearer ${data.client_secret.value}`, 
                        "Content-Type": "application/sdp" 
                    }
                });

                await pc.setRemoteDescription({ type: "answer", sdp: await sdpResponse.text() });
            } catch (e) { 
                document.getElementById('status-text').textContent = "ERROR"; 
            }
        }
    </script>
</body>
</html>
