<!DOCTYPE html>
<html>
<head>
    <title>A1 Brain</title>
    <style>
        body { margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #000; color: #ffcc00; font-family: sans-serif; }
        #status { margin-bottom: 20px; letter-spacing: 2px; }
        .orb { width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle, #ffcc00, #b38f00); box-shadow: 0 0 30px #ffcc00; cursor: pointer; }
        /* Animation when talking */
        .active .orb { animation: pulse 1s infinite alternate; }
        @keyframes pulse { from { transform: scale(1); opacity: 1; } to { transform: scale(1.1); opacity: 0.8; } }
        #footer { position: absolute; bottom: 20px; border-top: 2px solid #ffcc00; width: 250px; text-align: center; padding-top: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="status">TALK TO OUR AI TEAM MEMBER</div>
    <div id="orb-container" onclick="start()">
        <div class="orb"></div>
    </div>
    <div id="footer">A1 PROFESSIONAL ASPHALT LLC</div>

    <script>
        async function start() {
            document.body.className = 'active';
            document.getElementById('status').textContent = "LISTENING...";
            try {
                const r = await fetch('/session');
                const data = await r.json();
                const pc = new RTCPeerConnection();
                const audio = document.createElement("audio");
                audio.autoplay = true;
                pc.ontrack = e => audio.srcObject = e.streams[0];
                const ms = await navigator.mediaDevices.getUserMedia({ audio: true });
                pc.addTrack(ms.getTracks()[0]);
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);
                const sdpResponse = await fetch(`https://api.openai.com/v1/realtime?model=gpt-4o-realtime-preview-2024-12-17`, {
                    method: "POST",
                    body: offer.sdp,
                    headers: { Authorization: `Bearer ${data.client_secret.value}`, "Content-Type": "application/sdp" }
                });
                await pc.setRemoteDescription({ type: "answer", sdp: await sdpResponse.text() });
            } catch (e) { document.getElementById('status').textContent = "CONNECTION ERROR"; }
        }
    </script>
</body>
</html>
